import = [
    "~/.config/alacritty/themes/themes/gruvbox_dark.toml"
]
[shell]
program = "/run/current-system/sw/bin/zsh"

[font]
size = 12.0

[font.bold]
family = "RobotoMono Nerd Font Mono"
style = "Bold"

[font.bold_italic]
family = "RobotoMono Nerd Font Mono"
style = "Bold Italic"

[font.italic]
family = "RobotoMono Nerd Font Mono"
style = "Italic"

[font.normal]
family = "RobotoMono Nerd font Mono"
style = "Regular"


